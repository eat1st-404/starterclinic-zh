<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/images/icon-bread.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>酵种问诊日记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      min-height: calc(100vh - 70px - 56px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 60px 24px 100px;
    }
    .hero-char { width: 200px; margin-bottom: 32px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .hero-greeting {
      font-family: 'Cubic 11', monospace;
      font-size: 1.6rem; color: var(--text);
      margin-bottom: 12px; line-height: 1.6;
    }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-bottom: 48px; }
    .hero-actions { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .hero-actions a { min-width: 220px; }
    .hero-stats {
      margin-top: 56px; display: flex; gap: 40px;
      font-size: 0.88rem; color: var(--muted);
    }
    .stat-num {
      font-family: 'Cubic 11', monospace;
      font-size: 1.6rem; color: var(--accent);
      display: block; margin-bottom: 4px;
    }
    @media (max-width: 600px) {
      .hero-greeting { font-size: 1.2rem; }
      .hero-stats { gap: 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="logo">酵种问诊日记</span>
    <img src="assets/images/char-group.png" alt="" class="nav-center" style="height:28px;">
    <div class="nav-right">
      <a href="index.html" class="nav-link active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 7L8 2l6 5v7H10V9H6v5H2z"/></svg>首页
      </a>
      <a href="clinic.html" class="nav-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>问诊
      </a>
      <a href="diary.html" class="nav-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="2" width="10" height="12" rx="1"/><path d="M6 5h4M6 8h4M6 11h2"/></svg>日记
      </a>
      <button class="nav-auth" id="navAuthBtn" onclick="openLogin()">登录</button>
    </div>
    <button class="nav-hamburger" onclick="openMobileMenu()"><span></span><span></span><span></span></button>
  </nav>
  <div class="nav-mobile-menu" id="mobileMenu">
    <button class="nav-mobile-close" onclick="closeMobileMenu()">✕</button>
    <a href="index.html" class="nav-link" onclick="closeMobileMenu()">首页</a>
    <a href="clinic.html" class="nav-link" onclick="closeMobileMenu()">问诊</a>
    <a href="diary.html" class="nav-link" onclick="closeMobileMenu()">日记</a>
    <button class="nav-auth" id="navAuthBtnMobile" onclick="openLogin()" style="margin-left:0;">登录</button>
  </div>
  <div class="login-overlay" id="loginOverlay" onclick="handleOverlayClick(event)">
    <div class="login-box">
      <h2>开始记录</h2>
      <p>填手机号或邮箱，你的问诊记录会自动存档。</p>
      <input type="text" id="loginInput" placeholder="手机号 / 邮箱" />
      <button class="btn-primary" onclick="doLogin()">继续 →</button>
    </div>
  </div>

  <div class="hero">
    <img src="assets/images/char-hero.png" alt="" class="hero-char" />
    <div class="hero-greeting">你的酵种今天怎么样啦？</div>
    <div class="hero-sub">描述一下你观察到的，我来帮你读懂它。</div>
    <div class="hero-actions">
      <a href="clinic.html" class="btn-primary">开始问诊 →</a>
      <a href="diary.html" class="btn-outline">查看我的日记</a>
    </div>
    <div class="hero-stats" id="heroStats" style="display:none;">
      <div><span class="stat-num" id="statCount">0</span>次问诊记录</div>
      <div><span class="stat-num" id="statStreak">0</span>天连续记录</div>
    </div>
  </div>

  <footer>酵种问诊日记 — 用最直白的话，读懂你的酵种</footer>

  <div class="contact-bar">
    <span>联系我们</span>
    <a class="contact-icon" title="小红书" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="18" height="18" rx="4"/>
        <path d="M8 12h8M12 8v8"/>
        <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
      </svg>
      小红书
    </a>
    <a class="contact-icon" title="微信" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 11.5c3.5 0 6.5-2 6.5-4.5S12.5 2.5 9 2.5 2.5 4.5 2.5 7c0 1.4.8 2.7 2 3.5L3.5 13l2.8-1.2c.8.2 1.7.3 2.7.3z"/>
        <path d="M15 13.5c2.8 0 5 1.6 5 3.5 0 1-.6 2-1.6 2.7l.6 2-2.2-1c-.6.1-1.2.2-1.8.2-2.8 0-5-1.6-5-3.5s2.2-3.5 5-3.5z"/>
      </svg>
      微信
    </a>
  </div>

  <script src="supabase.js"></script>
  <script>
    const AUTH_KEY = 'sc_user_contact';
    const USER_ID_KEY = 'sc_user_id';

    function getContact() { return localStorage.getItem(AUTH_KEY); }
    function getUserId() { return localStorage.getItem(USER_ID_KEY); }

    function updateNav() {
      const c = getContact();
      ['navAuthBtn','navAuthBtnMobile'].forEach(id => {
        const btn = document.getElementById(id);
        if (!btn) return;
        if (c) { btn.textContent = c.length > 10 ? c.slice(0,10)+'…' : c; btn.classList.add('logged-in'); }
        else { btn.textContent = '登录'; btn.classList.remove('logged-in'); }
      });
    }

    function openLogin() {
      const c = getContact();
      if (c && confirm(`退出登录（${c}）？`)) {
        localStorage.removeItem(AUTH_KEY); localStorage.removeItem(USER_ID_KEY); updateNav(); return;
      }
      if (!c) document.getElementById('loginOverlay').classList.add('open');
    }
    function handleOverlayClick(e) {
      if (e.target === document.getElementById('loginOverlay'))
        document.getElementById('loginOverlay').classList.remove('open');
    }
    async function doLogin() {
      const val = document.getElementById('loginInput').value.trim();
      if (!val) { alert('请填写手机号或邮箱'); return; }
      const uid = await getOrCreateUser(val);
      localStorage.setItem(AUTH_KEY, val);
      localStorage.setItem(USER_ID_KEY, uid);
      document.getElementById('loginOverlay').classList.remove('open');
      updateNav();
      loadStats(uid);
    }

    async function loadStats(uid) {
      if (!uid) return;
      const records = await getUserRecords(uid);
      if (!records.length) return;
      document.getElementById('statCount').textContent = records.length;
      // 连续天数
      const days = [...new Set(records.map(r => r.created_at.slice(0,10)))].sort().reverse();
      let streak = 1;
      for (let i = 1; i < days.length; i++) {
        const a = new Date(days[i-1]), b = new Date(days[i]);
        if ((a - b) === 86400000) streak++; else break;
      }
      document.getElementById('statStreak').textContent = streak;
      document.getElementById('heroStats').style.display = 'flex';
    }

    updateNav();
    const uid = getUserId();
    if (uid) loadStats(uid);

    function openMobileMenu() { document.getElementById('mobileMenu').classList.add('open'); }
    function closeMobileMenu() { document.getElementById('mobileMenu').classList.remove('open'); }
  </script>
</body>
</html>
